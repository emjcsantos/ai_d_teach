name: Feature request
description: Suggest a capability or improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should AI D Teach do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Lesson canvas
        - Tutor conversation
        - Voice
        - Lesson repository
        - Accessibility
        - Security/privacy
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
